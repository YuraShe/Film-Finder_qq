services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - .:/app:cached
      - /app/__pycache__
    environment:
      - FLASK_ENV=development
      - PORT=5000
      - SECRET_KEY=change-this-secret-key
      - OPENAI_BASE_URL=${OPENAI_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MODEL_NAME=gemma3:27b
      - TEMPERATURE=0.4
      - MAX_TOKENS=700
      - SYSTEM_PROMPT_PATH=/app/system-prompt.txt
      - DATABASE_URL=sqlite:///movie_finder.db
    depends_on:
      - chromadb

  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    ports:
      - "8001:8001"
    volumes:
      - chroma_data:/chroma

volumes:
  chroma_data:
