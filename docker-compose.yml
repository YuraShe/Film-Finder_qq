services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    volumes:
      - .:/workspace:cached
      - /workspace/__pycache__
    environment:
      - FLASK_ENV=development
      - SECRET_KEY=change-this-secret-key
      - OPENAI_BASE_URL=https://kurim.ithope.eu/v1
      - OPENAI_API_KEY=sk-ILa8IytkddEp-Soce7LSCQ
      - MODEL_NAME=gemma3:27b
      - TEMPERATURE=0.4
      - MAX_TOKENS=700
      - SYSTEM_PROMPT_PATH=/workspace/system-prompt.txt
      - DATABASE_URL=sqlite:///movie_finder.db
    depends_on:
      - chromadb

  chromadb:
    image: ghcr.io/chroma-core/chroma:latest
    ports:
      - "8001:8001"
    volumes:
      - chroma_data:/chroma

volumes:
  chroma_data:
